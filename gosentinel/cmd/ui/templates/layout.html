<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoSentinel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    .ok    { color: var(--pico-color-green-500); }
    .warn  { color: var(--pico-color-amber-500); }
    .crit  { color: var(--pico-color-red-500); }
    nav a  { margin-right: 1rem; }
    #alert-banner { position: fixed; bottom: 1rem; right: 1rem; z-index: 100; max-width: 400px; }
    .alert-item { padding: 0.5rem 1rem; margin-bottom: 0.5rem; border-radius: 4px; }
    .alert-item.critical { background: var(--pico-color-red-100); border-left: 4px solid var(--pico-color-red-500); }
    .alert-item.warning  { background: var(--pico-color-amber-100); border-left: 4px solid var(--pico-color-amber-500); }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <strong>GoSentinel</strong>
      <a href="/">Services</a>
      <a href="/alerts">Alerts</a>
      <a href="/slos">SLOs</a>
    </nav>
  </header>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>

  <!-- Real-time alert banner via SSE + Alpine.js -->
  <div id="alert-banner" x-data="alertBanner()" x-init="init()">
    <template x-for="alert in alerts" :key="alert.id">
      <div class="alert-item" :class="alert.severity">
        <strong x-text="alert.rule_name"></strong>
        <span x-text="alert.summary"></span>
      </div>
    </template>
  </div>

  <script>
    function alertBanner() {
      return {
        alerts: [],
        init() {
          const es = new EventSource('/sse/alerts');
          es.onmessage = (e) => {
            const alert = JSON.parse(e.data);
            this.alerts.unshift(alert);
            if (this.alerts.length > 5) this.alerts.pop();
          };
        }
      }
    }
  </script>
</body>
</html>
