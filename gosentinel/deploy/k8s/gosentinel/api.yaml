################################################################################
# GoSentinel API — Production Deployment + Ingress
################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosentinel-api
  namespace: gosentinel
  labels:
    app.kubernetes.io/name: gosentinel-api
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: gosentinel
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: gosentinel-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gosentinel-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: gosentinel-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: gosentinel-api

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: gosentinel-api
                topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      containers:
        - name: api
          image: gosentinel/api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: GOSENTINEL_SERVICE_NAME
              value: gosentinel-api
            - name: GOSENTINEL_OTLP_ENDPOINT
              value: otel-collector:4317
            - name: GOSENTINEL_VICTORIA_METRICS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: victoria_metrics_endpoint
            - name: GOSENTINEL_JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: jaeger_endpoint
            - name: GOSENTINEL_LOKI_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: loki_endpoint
            - name: GOSENTINEL_PYROSCOPE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: pyroscope_endpoint
            - name: GOSENTINEL_API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gosentinel-secrets
                  key: jwt_secret
            - name: GOSENTINEL_API_RATE_LIMIT
              value: "100"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 20
            periodSeconds: 3

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gosentinel-api
  namespace: gosentinel
  labels:
    app.kubernetes.io/name: gosentinel-api
spec:
  selector:
    app.kubernetes.io/name: gosentinel-api
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gosentinel-api-pdb
  namespace: gosentinel
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gosentinel-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gosentinel-api-hpa
  namespace: gosentinel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gosentinel-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
# Ingress with TLS termination and NGINX annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gosentinel-api-ingress
  namespace: gosentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # gRPC support for connectrpc
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/grpc-backend: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [api.gosentinel.example.com]
      secretName: gosentinel-api-tls
  rules:
    - host: api.gosentinel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gosentinel-api
                port:
                  name: http
