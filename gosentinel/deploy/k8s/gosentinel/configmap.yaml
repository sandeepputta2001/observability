################################################################################
# ConfigMaps and Secrets for GoSentinel
################################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: gosentinel-config
  namespace: gosentinel
data:
  otlp_endpoint:               "otel-collector.gosentinel.svc.cluster.local:4317"
  victoria_metrics_endpoint:   "http://victoriametrics.gosentinel.svc.cluster.local:8428"
  jaeger_endpoint:             "jaeger-query.gosentinel.svc.cluster.local:16685"
  loki_endpoint:               "http://loki.gosentinel.svc.cluster.local:3100"
  pyroscope_endpoint:          "http://pyroscope.gosentinel.svc.cluster.local:4040"
  api_addr:                    "http://gosentinel-api.gosentinel.svc.cluster.local:8080"
  # LGTM stack endpoints (used by Grafana datasources)
  tempo_endpoint:              "http://tempo.gosentinel.svc.cluster.local:3200"
  mimir_endpoint:              "http://mimir.gosentinel.svc.cluster.local:9009"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gosentinel-alert-rules
  namespace: gosentinel
data:
  alert-rules.yaml: |
    rules:
      - name: "High error rate"
        expr: 'rate(http_requests_total{status=~"5.."}[5m]) > 0.05'
        for: 2m
        severity: critical
        annotations:
          summary: "Service error rate above 5%"
          description: "Error rate is {{ $value | humanize }} req/s"
        notify: [slack, pagerduty, gmail, opsgenie, teams]

      - name: "High p99 latency"
        expr: 'histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1.0'
        for: 5m
        severity: warning
        annotations:
          summary: "P99 latency above 1 second"
        notify: [slack, gmail, webhook, teams]

      - name: "Service down"
        expr: 'up == 0'
        for: 1m
        severity: critical
        annotations:
          summary: "Service is down"
        notify: [slack, pagerduty, gmail, opsgenie, webhook, teams]

      - name: "High memory usage"
        expr: 'process_resident_memory_bytes > 500000000'
        for: 10m
        severity: warning
        annotations:
          summary: "Process memory above 500MB"
        notify: [slack, gmail, teams]

      - name: "SLO burn rate fast"
        expr: 'gosentinel_slo_burn_rate{window="1h"} > 14.4'
        for: 2m
        severity: critical
        annotations:
          summary: "SLO fast burn rate exceeded (1h window)"
          description: "Burn rate {{ $value | humanize }}x — error budget will be exhausted in < 1 hour"
        notify: [slack, pagerduty, gmail, opsgenie, teams]

      - name: "SLO burn rate slow"
        expr: 'gosentinel_slo_burn_rate{window="6h"} > 6.0'
        for: 15m
        severity: warning
        annotations:
          summary: "SLO slow burn rate exceeded (6h window)"
        notify: [slack, gmail, webhook, teams]
---
# Secret template — in production use External Secrets Operator or Sealed Secrets
# kubectl create secret generic gosentinel-secrets -n gosentinel \
#   --from-literal=postgres_dsn='...' \
#   --from-literal=jwt_secret='...' \
#   --from-literal=slack_webhook='...' \
#   etc.
apiVersion: v1
kind: Secret
metadata:
  name: gosentinel-secrets
  namespace: gosentinel
type: Opaque
stringData:
  postgres_dsn:      "postgres://gosentinel:CHANGE_ME@postgres:5432/gosentinel?sslmode=require"
  jwt_secret:        "CHANGE_ME_IN_PRODUCTION_USE_32_CHARS_MIN"
  slack_webhook:     ""
  pagerduty_key:     ""
  gmail_username:    ""
  gmail_password:    ""
  gmail_to:          ""
  opsgenie_key:      ""
  opsgenie_region:   "us"
  teams_webhook:     ""
  webhook_url:       ""
  webhook_secret:    ""
