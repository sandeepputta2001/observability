################################################################################
# GoSentinel UI — Production Deployment + Ingress
################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosentinel-ui
  namespace: gosentinel
  labels:
    app.kubernetes.io/name: gosentinel-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: gosentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gosentinel-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gosentinel-ui
        app.kubernetes.io/component: ui
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: gosentinel-ui
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: gosentinel-ui

      terminationGracePeriodSeconds: 30

      containers:
        - name: ui
          image: gosentinel/ui:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: GOSENTINEL_OTLP_ENDPOINT
              value: otel-collector:4317
            - name: GOSENTINEL_VICTORIA_METRICS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: victoria_metrics_endpoint
            - name: GOSENTINEL_JAEGER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: jaeger_endpoint
            - name: GOSENTINEL_LOKI_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: loki_endpoint
            - name: GOSENTINEL_PYROSCOPE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: pyroscope_endpoint
            - name: GOSENTINEL_UI_API_ADDR
              value: http://gosentinel-api:8080

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gosentinel-ui
  namespace: gosentinel
  labels:
    app.kubernetes.io/name: gosentinel-ui
spec:
  selector:
    app.kubernetes.io/name: gosentinel-ui
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gosentinel-ui-pdb
  namespace: gosentinel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gosentinel-ui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gosentinel-ui-ingress
  namespace: gosentinel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [gosentinel.example.com]
      secretName: gosentinel-ui-tls
  rules:
    - host: gosentinel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gosentinel-ui
                port:
                  name: http
