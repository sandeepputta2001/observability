apiVersion: apps/v1
kind: Deployment
metadata:
  name: gosentinel-pipeline
  namespace: gosentinel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gosentinel-pipeline
  template:
    metadata:
      labels:
        app: gosentinel-pipeline
    spec:
      containers:
        - name: pipeline
          image: gosentinel/pipeline:latest
          ports:
            - containerPort: 9090
          env:
            - name: GOSENTINEL_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: otlp_endpoint
            - name: GOSENTINEL_VICTORIA_METRICS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: gosentinel-config
                  key: victoria_metrics_endpoint
            - name: GOSENTINEL_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: gosentinel-secrets
                  key: postgres_dsn
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gosentinel-pipeline
  namespace: gosentinel
spec:
  selector:
    app: gosentinel-pipeline
  ports:
    - name: http
      port: 9090
      targetPort: 9090
